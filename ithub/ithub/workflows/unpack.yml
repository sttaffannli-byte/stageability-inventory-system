name: Unpack Stageability

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract application
        run: |
          if [ ! -f Stageability-Cloudflare-Deploy.zip ]; then exit 0; fi
          unzip -o Stageability-Cloudflare-Deploy.zip -d /tmp/stageability
          cp -a /tmp/stageability/stageability-cloudflare/. .
          rm Stageability-Cloudflare-Deploy.zip
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "Extract Stageability Cloudflare application"
          git push
